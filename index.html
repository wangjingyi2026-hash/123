        const allProducts = JSON.parse(productsData);
        
        // 类目显示顺序
        const categoryOrder = ["洗发护发", "美发/造型", "口腔护理", "卫生巾/女士私处护理", "身体护理", "身体清洁", "驱虫用品", "个护用具", "男士个护清洁"];

        console.log('商品数据加载成功，共', allProducts.length, '件商品');

        let visibleProductCount = 0;

        function init() {
            updateStats();
            renderProductsByCategory();
        }

        function updateStats() {
            const totalCount = allProducts.length;
            const categorySet = new Set(allProducts.map(p => p['商品二级类目名称(最新)'] || '其他'));
            const categoryCount = categorySet.size;
            const sellerSet = new Set(allProducts.map(p => p['货主ID']));
            const sellerCount = sellerSet.size;

            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('categoryCount').textContent = categoryCount;
            document.getElementById('sellerCount').textContent = sellerCount;
            document.getElementById('footerCount').textContent = totalCount;
        }

        function handleImageError(img) {
            const card = img.closest('.product-card');
            if (card) {
                card.classList.add('image-error');
                visibleProductCount--;
                
                const categorySection = card.closest('.category-section');
                if (categorySection) {
                    updateCategoryCount(categorySection);
                }
                
                updateFooterCount();
            }
        }

        function handleImageLoad(img) {
            visibleProductCount++;
            updateFooterCount();
        }

        function updateCategoryCount(categorySection) {
            const visibleCards = categorySection.querySelectorAll('.product-card:not(.image-error)');
            const countBadge = categorySection.querySelector('.category-count');
            if (countBadge) {
                countBadge.textContent = visibleCards.length + ' 件';
            }
            
            if (visibleCards.length === 0) {
                categorySection.classList.add('empty-category');
            }
        }

        function updateFooterCount() {
            document.getElementById('footerCount').textContent = visibleProductCount;
        }

        function renderProductsByCategory() {
            const container = document.getElementById('productList');
            
            // 按类目分组
            const categoryMap = {};
            allProducts.forEach(product => {
                const category = product['商品二级类目名称(最新)'] || '其他';
                if (!categoryMap[category]) {
                    categoryMap[category] = [];
                }
                categoryMap[category].push(product);
            });

            // 按照指定顺序排序类目
            const sortedCategories = [];
            
            // 先添加指定顺序的类目
            categoryOrder.forEach(cat => {
                if (categoryMap[cat]) {
                    sortedCategories.push(cat);
                }
            });
            
            // 再添加其他未指定的类目（按字母顺序）
            Object.keys(categoryMap).forEach(cat => {
                if (!categoryOrder.includes(cat)) {
                    sortedCategories.push(cat);
                }
            });

            const html = sortedCategories.map(category => {
                const categoryProducts = categoryMap[category];
                
                const productsHtml = categoryProducts.map((product, index) => {
                    const itemId = product['商品ID'] || '';
                    const name = product['商品名称(最新)'] || '';
                    const brand = product['品牌名称'] || '无品牌';
                    const isNoBrand = !product['品牌名称'] || product['品牌名称'].trim() === '';
                    const price = product['商品价格'] || '0.0';
                    const imageUrl = product['商品主图url'] || '';
                    const commission = product['佣金'] || '';
                    
                    const commissionMatch = commission.match(/赚：([\d.]+).*佣金：([\d.]+)%/);
                    const earnAmount = commissionMatch ? commissionMatch[1] : '';
                    const commissionRate = commissionMatch ? commissionMatch[2] : '';
                    
                    const detailUrl = `https://cps.kwaixiaodian.com/pc/promoter/selection-center/detail?relItemId=${itemId}`;

                    return `
                        <div class="product-card" data-category="${category}" onclick="window.open('${detailUrl}', '_blank')">
                            <div class="product-image-wrapper">
                                <img class="product-image" 
                                     src="${imageUrl}" 
                                     alt="${name}" 
                                     loading="lazy"
                                     onerror="handleImageError(this)"
                                     onload="handleImageLoad(this)">
                                ${commissionRate ? `<div class="commission-badge">${commissionRate}%</div>` : ''}
                            </div>
                            <div class="product-info">
                                <div class="brand-name ${isNoBrand ? 'no-brand' : ''}">${brand}</div>
                                <div class="product-name">${name}</div>
                                <div class="product-price">
                                    <span class="price-value">¥${price}</span>
                                </div>
                                ${earnAmount ? `<div class="commission-info">💰 赚 ¥${earnAmount}</div>` : ''}
                                <div class="product-id">ID: ${itemId}</div>
                                <a href="${detailUrl}" class="view-btn" target="_blank" onclick="event.stopPropagation()">
                                    查看详情
                                </a>
                            </div>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="category-section" data-category="${category}">
                        <div class="category-header">
                            <div class="category-title">
                                📦 ${category}
                            </div>
                            <div class="category-count">${categoryProducts.length} 件</div>
                        </div>
                        <div class="products-grid">
                            ${productsHtml}
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = html;
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
